<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AknoRM - ASC Knowledge Repository</title>
    <style>
        :root { --army-green: #4B5320; --gold: #D4AF37; --light-gray: #f4f4f4; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--light-gray); text-align: center; }
        header { background: var(--army-green); color: white; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        /* Main Grid Menu */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; max-width: 500px; margin: auto; }
        .menu-item { background: white; border: 2px solid var(--army-green); padding: 20px; border-radius: 12px; 
                     font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .menu-item:active { background: var(--gold); transform: scale(0.95); }
        .full-width { grid-column: span 2; }

        /* Content View */
        #content-view { display: none; padding: 20px; text-align: left; background: white; min-height: 100vh; }
        .back-btn { background: var(--army-green); color: white; border: none; padding: 10px 20px; border-radius: 5px; margin-bottom: 20px; cursor: pointer; }
        
        /* Responsive Video Wrapper */
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; margin: 20px 0; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .instruction-text { line-height: 1.6; color: #333; font-size: 1.1em; background: #fffde7; padding: 15px; border-left: 5px solid var(--gold); }
    </style>
</head>
<body>

<header>
    <h1>AknoRM</h1>
    <p>ASC Knowledge Repository (MT)</p>
</header>

<div id="main-menu" class="menu-grid">
    <div class="menu-item full-width" onclick="showCategory('Search')">🔍 খুঁজুন (Search)</div>
    <div class="menu-item" onclick="showCategory('Safety')">🛡️ ড্রাইভিং নির্দেশিকা</div>
    <div class="menu-item" onclick="showCategory('PreDrive')">⚙️ চালনার পূর্বে</div>
    <div class="menu-item" onclick="showCategory('Dashboard')">📟 ড্যাশবোর্ড সূচক</div>
    <div class="menu-item" onclick="showCategory('Fault')">🛠️ ত্রুটি নিরূপণ</div>
    <div class="menu-item" onclick="showCategory('Maintenance')">🔧 রক্ষণাবেক্ষণ</div>
    <div class="menu-item" onclick="showCategory('Video')">🎥 প্রশিক্ষণ ভিডিও</div>
</div>

<div id="content-view">
    <button class="back-btn" onclick="goHome()">⬅ ফিরে যান (Back)</button>
    <h2 id="cat-title"></h2>
    <div id="cat-content"></div>
</div>

<script src="data.js"></script>

<script>
    // 2. Use the data from the external file
    function showCategory(cat) {
        const item = aknoRM_Data[cat]; // This now pulls from data.js
        if(!item) { 
            alert("এই মডিউলটি এখনো আপডেট করা হয়নি। শীঘ্রই আসছে!"); 
            return; 
        }
        
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('content-view').style.display = 'block';
        
        document.getElementById('cat-title').innerText = item.title;
        document.getElementById('cat-content').innerHTML = `
            <div class="instruction-text">${item.text}</div>
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/${item.youtubeId}" frameborder="0" allowfullscreen></iframe>
            </div>
        `;
        window.scrollTo(0,0);
    }

    function goHome() {
        document.getElementById('main-menu').style.display = 'grid';
        document.getElementById('content-view').style.display = 'none';
    }
</script>

</body>
</html>
